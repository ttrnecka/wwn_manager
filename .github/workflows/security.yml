name: Security Scan & Linters

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 1 * *"
  pull_request:

env:
  GO_VERSION: '1.25.9'
  GOLANGCI_LINT_VERSION: v2.11.4
  NODE_VERSION: '20'

jobs:
  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: ./.github/actions/checkout
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - id: set-modules
        run: echo "modules=$(go list -m -json | jq -s '.' | jq -c '[.[].Dir]')" >> $GITHUB_OUTPUT

  golangci-lint:
    needs: detect-modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modules: ${{ fromJSON(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: ./.github/actions/checkout
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint ${{ matrix.modules }}
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.modules }}
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/checkout

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: cd webapi && go test ./...
        
  go-security:
    name: Golang vulnerability check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: ./.github/actions/checkout

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Download dependencies
      run: go mod download

    - name: Run govulncheck
      run: cd webapi && govulncheck ./...


  npm-security:
    name: NPM security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: ./.github/actions/checkout

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install frontend dependencies
      run: cd frontend && npm install

    - name: Run npm audit
      run: cd frontend && npm audit --omit=dev --audit-level=high

    - name: Run npm eslint
      run: cd frontend && npx eslint "**/*.{js,mjs,cjs,vue}" --max-warnings=0

  trivy-scan-public:
    if: github.server_url == 'https://github.com'
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - uses: ./.github/actions/checkout

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        exit-code: '0'
        format: 'sarif'
        output: 'trivy-results.sarif'
        vuln-type: 'library'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

