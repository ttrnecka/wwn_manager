services:
  wwn_webapi_scan:
    build:
      context: ../../
      dockerfile: ./webapi/Dockerfile.scan
    image: wwn_webapi_scan:0.0.1
  frontend_scan:
    build:
      context: ../../
      dockerfile: ./frontend/Dockerfile.scan
    image: frontend_scan:0.0.1
  trivy:
    build:
      context: ../../
      dockerfile: ./Dockerfile.trivy
    container_name: trivy-scan
    volumes:
      - ../../:/workspace
      - trivy-cache:/root/.cache/
    working_dir: /workspace
    command: >
      fs
      --scanners vuln,secret,misconfig
      --vuln-type library
      --severity HIGH,CRITICAL
      --exit-code 1
      --no-progress
      /workspace

volumes:
  trivy-cache: